<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOW RUNNER: OVERDRIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; touch-action: none; color: white; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }
        
        /* --- OVERLAYS --- */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 20; backdrop-filter: blur(10px);
        }
        .hidden { display: none !important; }

        .title-img { max-width: 80%; max-height: 150px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #0ff); }
        
        .footer-logo-container { 
            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
            opacity: 0.6; 
            pointer-events: none;
            z-index: 25;
        }
        .footer-logo { width: 40px; height: auto; border-radius: 5px; }
        .made-by { font-size: 0.5rem; letter-spacing: 2px; color: #888; }

        h1 { font-size: 2.2rem; color: #0ff; text-shadow: 0 0 20px #0ff; margin: 5px 0; letter-spacing: 5px; text-align: center; }
        .btn { 
            background: rgba(0,255,255,0.1); border: 2px solid #0ff; color: #0ff; 
            padding: 12px 20px; font-family: 'Orbitron'; font-size: 0.9rem; 
            cursor: pointer; transition: 0.3s; border-radius: 8px; text-transform: uppercase;
            width: 280px; margin: 6px 0;
        }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        .daily-rift-btn {
            position: relative;
            overflow: hidden;
            border-color: #ff0;
            color: #ff0;
            background: rgba(255,255,0,0.08);
            box-shadow: 0 0 14px rgba(255,255,0,0.55), inset 0 0 18px rgba(255,0,255,0.15);
            animation: dailyRiftPulse 1.4s infinite ease-in-out;
        }
        .daily-rift-btn::after {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 8px;
            border: 1px solid rgba(255,0,255,0.8);
            opacity: 0;
            animation: dailyRiftRing 1.4s infinite;
        }
        .daily-rift-btn:hover {
            background: #ff0;
            color: #000;
            box-shadow: 0 0 28px #ff0, 0 0 45px #f0f;
        }
        .ghost-station-btn {
            position: relative;
            overflow: hidden;
            border-color: #f0f;
            color: #fff;
            background: linear-gradient(90deg, rgba(255,0,255,0.15), rgba(0,255,255,0.18), rgba(255,255,0,0.12));
            box-shadow: 0 0 18px rgba(255,0,255,0.6), inset 0 0 18px rgba(0,255,255,0.18);
            animation: ghostStationPulse 1.2s infinite ease-in-out;
        }
        .ghost-station-btn::before {
            content: "";
            position: absolute;
            top: -80%;
            left: -35%;
            width: 35%;
            height: 260%;
            background: rgba(255,255,255,0.55);
            transform: rotate(25deg);
            animation: ghostStationScan 1.7s infinite;
        }
        .ghost-station-btn:hover {
            background: #f0f;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 35px #f0f, 0 0 55px #0ff;
        }
        .new-badge {
            position: absolute;
            top: -9px;
            right: 12px;
            padding: 3px 7px;
            border-radius: 999px;
            background: #ff0;
            color: #000;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 0 14px #ff0;
            animation: newBadgePop 0.75s infinite alternate;
        }

        #hud { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .hud-val { color: #0ff; font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px #0ff; }
        #eventHud { color: #ff0; font-size: 0.78rem; margin-top: 4px; text-shadow: 0 0 10px #ff0; letter-spacing: 1px; }
        #comboHud {
            color: #f0f; font-size: 0.82rem; margin-top: 4px; letter-spacing: 2px;
            text-shadow: 0 0 10px #f0f; transform-origin: center;
        }
        #comboHud.surge { color: #ff0; text-shadow: 0 0 12px #ff0, 0 0 22px #f0f; animation: comboPop 0.45s infinite alternate; }
        
        #reverseContainer { 
            position: absolute; bottom: 20px; left: 20px; z-index: 30; 
            display: flex; flex-direction: column; align-items: center;
        }
        #reverseBtn {
            width: 70px; height: 70px; border-radius: 50%; border: 4px solid #333;
            background: rgba(0,0,0,0.6); color: #555; font-weight: bold; font-size: 0.7rem;
            display: flex; align-items: center; justify-content: center; cursor: not-allowed;
            transition: 0.3s; user-select: none;
        }
        #reverseBtn.ready { border-color: #ff0; color: #ff0; cursor: pointer; box-shadow: 0 0 20px #ff0; animation: pulse 1s infinite; }
        #reverseBtn.active { border-color: #f0f; color: #fff; background: #f0f; animation: shake 0.2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
        @keyframes comboPop {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }
        @keyframes dailyRiftPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.035); filter: brightness(1.35); }
        }
        @keyframes dailyRiftRing {
            0% { opacity: 0.8; transform: scale(0.96); }
            100% { opacity: 0; transform: scale(1.16); }
        }
        @keyframes ghostStationPulse {
            0%, 100% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.045); filter: hue-rotate(55deg); }
        }
        @keyframes ghostStationScan {
            0% { left: -45%; opacity: 0; }
            35% { opacity: 0.9; }
            100% { left: 120%; opacity: 0; }
        }
        @keyframes newBadgePop {
            from { transform: rotate(-5deg) scale(1); }
            to { transform: rotate(5deg) scale(1.18); }
        }

        /* SHOP STYLES */
        #shop { justify-content: flex-start; padding-top: 10px; overflow-y: auto; display: block; text-align: center; }
        .shop-container { display: inline-block; width: 100%; max-width: 500px; padding-bottom: 80px; }
        .points-display { position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 30; font-size: 1.1rem; color: #ff0; padding: 12px; border-bottom: 2px solid #0ff; margin-bottom: 10px; }
        .preview-card { background: #0a0a0a; border: 2px solid #0ff; margin: 0 auto 15px auto; width: 260px; padding: 12px; border-radius: 12px; }
        #previewRenderBox { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px auto; background: #111; border: 1px solid #333; overflow: hidden; }
        .category-title { font-size: 0.7rem; color: #f0f; margin: 20px 0 8px 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #f0f; display: inline-block; padding: 0 10px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 90%; margin: 0 auto; }
        .item-btn { border: 1px solid #444; padding: 10px 5px; font-size: 0.6rem; color: #888; background: #050505; border-radius: 5px; width: 100%; cursor: pointer; font-family: 'Orbitron'; }
        .item-btn.owned { border-color: #0f0; color: #0f0; }
        .item-btn.active { background: #0ff; color: #000; border-color: #fff; font-weight: bold; }

        .run-result-card {
            width: min(92vw, 430px);
            border: 2px solid #0ff;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(0,20,28,0.96), rgba(0,0,0,0.96));
            box-shadow: 0 0 35px rgba(0,255,255,0.7), inset 0 0 28px rgba(255,0,255,0.14);
            padding: 24px;
            text-align: center;
        }
        .result-title {
            color: #ff0;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-shadow: 0 0 14px #ff0;
            margin-bottom: 10px;
        }
        .result-message {
            color: #0ff;
            font-size: 1.55rem;
            line-height: 1.1;
            margin: 0 0 18px 0;
            text-shadow: 0 0 18px #0ff;
        }
        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 18px 0;
        }
        .result-stat {
            border: 1px solid rgba(0,255,255,0.35);
            border-radius: 12px;
            padding: 12px;
            background: rgba(0,255,255,0.06);
        }
        .result-stat span {
            display: block;
            color: #888;
            font-size: 0.58rem;
            letter-spacing: 2px;
            margin-bottom: 7px;
        }
        .result-stat b {
            color: #fff;
            font-size: 1.15rem;
            text-shadow: 0 0 10px #0ff;
        }
        .result-actions {
            display: grid;
            gap: 9px;
        }
        .replay-badge {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 18;
            padding: 10px 15px;
            border: 1px solid #f0f;
            border-radius: 999px;
            background: rgba(0,0,0,0.72);
            color: #fff;
            text-shadow: 0 0 12px #f0f;
            letter-spacing: 2px;
            font-size: 0.7rem;
            box-shadow: 0 0 22px rgba(255,0,255,0.45);
        }
        .replay-timeline {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            z-index: 18;
            width: min(88vw, 680px);
            border: 1px solid rgba(0,255,255,0.45);
            border-radius: 16px;
            background: rgba(0,0,0,0.72);
            box-shadow: 0 0 24px rgba(0,255,255,0.28);
            padding: 12px 14px;
        }
        .replay-time-row {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 0.62rem;
            letter-spacing: 2px;
            margin-bottom: 9px;
        }
        .replay-track {
            height: 9px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            cursor: pointer;
        }
        #replayProgress {
            display: block;
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0);
            box-shadow: 0 0 14px #0ff;
        }
        .replay-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 11px;
        }
        .replay-controls button {
            border: 1px solid rgba(0,255,255,0.45);
            border-radius: 10px;
            background: rgba(0,255,255,0.08);
            color: #0ff;
            padding: 8px 6px;
            font-family: 'Orbitron';
            font-size: 0.62rem;
            letter-spacing: 1px;
        }
        .replay-controls button:last-child {
            border-color: rgba(255,255,0,0.55);
            color: #ff0;
        }
        #surgeFrame {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            border: 7px solid transparent;
            box-shadow:
                inset 0 0 28px #0ff,
                inset 0 0 52px #f0f,
                0 0 28px #ff0;
            background:
                linear-gradient(90deg, rgba(0,255,255,0.18), rgba(255,0,255,0.12), rgba(255,255,0,0.16), rgba(0,255,255,0.18));
            mix-blend-mode: screen;
            opacity: 0;
        }
        #surgeFrame.active {
            opacity: 1;
            animation: surgeFrameFlicker 0.18s infinite alternate;
        }
        @keyframes surgeFrameFlicker {
            0% { filter: hue-rotate(0deg) brightness(1.15); clip-path: inset(0 0 0 0); }
            35% { filter: hue-rotate(95deg) brightness(1.75); clip-path: inset(1% 0 0 0); }
            70% { filter: hue-rotate(210deg) brightness(1.3); clip-path: inset(0 1% 1% 0); }
            100% { filter: hue-rotate(330deg) brightness(2); clip-path: inset(0 0 1% 1%); }
        }
    </style>
</head>
<body>

    <div id="hud" class="hidden">
        SCORE: <span id="currentScore" class="hud-val">0</span> | 
        💎: <span id="totalPointsHud" class="hud-val">0</span>
        <div id="eventHud" class="hidden">DAILY RIFT: <span id="riftTimer">60</span>s | 2X FIELDS</div>
        <div id="comboHud" class="hidden">COMBO x<span id="comboMult">1</span> | <span id="comboTime">0</span>s</div>
    </div>

    <div id="reverseContainer" class="hidden">
        <div id="reverseBtn" onclick="activateReverse()">REVERSE</div>
        <div style="font-size: 0.5rem; margin-top: 5px; color: #ff0; letter-spacing: 1px;">OVERDRIVE</div>
    </div>

    <div id="menu" class="overlay">
        <img src="ChatGPT Image 6. Mai 2026, 18_30_59.png" alt="Title Art" class="title-img">
        <h1 id="welcomeText">GLOW RUNNER</h1>
        
        <div style="color: #0f0; font-size: 0.7rem; margin-bottom: 15px; letter-spacing: 1px;">
            ● <span id="onlineVal">0</span> RUNNER LIVE
        </div>
        
        <button class="btn" onclick="startGame()" style="border-color: #0f0; color: #0f0;">LAUNCH GAME</button>
        <button class="btn daily-rift-btn" onclick="startDailyRift()">DAILY RIFT</button>
        <button class="btn ghost-station-btn" onclick="location.href='ghost-runner-beta.html'">
            GHOST STATION
            <span class="new-badge">NEW</span>
        </button>
        <button class="btn" onclick="location.href='modes.html'">SELECT MODE</button>
        <button class="btn" onclick="openShop()">ARMORY & SHOP</button>
        <button class="btn" onclick="location.href='quests.html'">MISSIONS</button>
        <button class="btn" onclick="location.href='leaderboard.html'">RANKING</button>

        <div style="margin-top: 15px; text-align: center;">
            <p style="color: #ff0; margin: 2px 0;">RECORD: <span id="menuHighscore" style="color: #0ff;">0</span></p>
            <p style="color: #ff0; margin: 2px 0;">CRYSTALS: <span id="menuTotal" style="color: #0ff;">0</span></p>
        </div>

        <div class="footer-logo-container">
            <span class="made-by">MADE BY</span>
            <img src="EliX Tag.png" alt="Logo" class="footer-logo">
        </div>
    </div>

    <div id="shop" class="overlay hidden">
        <div class="shop-container">
            <div class="points-display">💎 <span id="shopPoints">0</span> CRYSTALS</div>
            
            <div class="preview-card">
                <div id="previewRenderBox"><div id="shipPreview"></div></div>
                <div id="previewMeta" style="font-size: 0.7rem; margin-bottom: 8px;">Select an item</div>
                <button id="actionBtn" class="btn" style="width: 100%; font-size: 0.7rem;" onclick="handleAction()">ACTION</button>
            </div>

            <div class="category-title">Vessel Tints</div>
            <div class="shop-grid">
                <button class="item-btn" id="color-cyan" onclick="setPreview('color', 'cyan', 0)">CYAN (0)</button>
                <button class="item-btn" id="color-#0f0" onclick="setPreview('color', '#0f0', 100)">LIME (100)</button>
                <button class="item-btn" id="color-#f0f" onclick="setPreview('color', '#f0f', 250)">GHOST (250)</button>
                <button class="item-btn" id="color-#ff0" onclick="setPreview('color', '#ff0', 500)">GOLD (500)</button>
                <button class="item-btn" id="color-#ff4500" onclick="setPreview('color', '#ff4500', 1000)">PULSE RED (1000)</button>
                <button class="item-btn" id="color-rainbow" onclick="setPreview('color', 'rainbow', 5000)">RAINBOW (5000)</button>
            </div>

            <div class="category-title">Chassis Shapes</div>
            <div class="shop-grid">
                <button class="item-btn" id="shape-circle" onclick="setPreview('shape', 'circle', 0)">ORB (0)</button>
                <button class="item-btn" id="shape-square" onclick="setPreview('shape', 'square', 300)">CUBE (300)</button>
                <button class="item-btn" id="shape-triangle" onclick="setPreview('shape', 'triangle', 750)">DELTA (750)</button>
                <button class="item-btn" id="shape-star" onclick="setPreview('shape', 'star', 2000)">NOVA (2000)</button>
                <button class="item-btn" id="shape-diamond" onclick="setPreview('shape', 'diamond', 5000)">DIAMOND (5000)</button>
                <button class="item-btn" id="shape-phoenix" onclick="setPreview('shape', 'phoenix', 10000)">PHOENIX (10000)</button>
            </div>

            <div class="category-title">Battle Zones</div>
            <div class="shop-grid">
                <button class="item-btn" id="map-none" onclick="setPreview('map', 'none', 0)">VOID (0)</button>
                <button class="item-btn" id="map-grid" onclick="setPreview('map', 'grid', 500)">CYBER GRID (500)</button>
                <button class="item-btn" id="map-stars" onclick="setPreview('map', 'stars', 1200)">GALAXY (1200)</button>
                <button class="item-btn" id="map-matrix" onclick="setPreview('map', 'matrix', 3000)">MAINFRAME (3000)</button>
            </div>

            <button class="btn" onclick="closeShop()" style="margin: 30px; border-color: #f0f; color: #f0f; width: 80%;">BACK TO MENU</button>

    </div>

    <div id="runResult" class="overlay hidden">
        <div class="run-result-card">
            <div class="result-title">RUN COMPLETE</div>
            <h2 id="resultMessage" class="result-message">DESTRUCTION</h2>
            <div class="result-stats">
                <div class="result-stat"><span>SCORE</span><b id="resultScore">0</b></div>
                <div class="result-stat"><span>BEST</span><b id="resultBest">0</b></div>
                <div class="result-stat"><span>COMBO</span><b id="resultCombo">0</b></div>
                <div class="result-stat"><span>MODE</span><b id="resultMode">NORMAL</b></div>
            </div>
            <div class="result-actions">
                <button class="btn" onclick="startReplay()" style="width:100%; border-color:#f0f; color:#f0f;">REPLAY CAMERA</button>
                <button class="btn" onclick="startGame()" style="width:100%; border-color:#0ff; color:#0ff;">NOCH EIN SPIEL</button>
                <button class="btn" onclick="closeRunResult()" style="width:100%; border-color:#0f0; color:#0f0;">BACK TO MENU</button>
            </div>
        </div>
    </div>

    <div id="replayBadge" class="replay-badge hidden">REPLAY CAMERA</div>
    <div id="replayTimeline" class="replay-timeline hidden">
        <div class="replay-time-row">
            <span id="replayTime">00:00</span>
            <span id="replayTotal">00:00</span>
        </div>
        <div id="replayTrack" class="replay-track"><i id="replayProgress"></i></div>
        <div class="replay-controls">
            <button onclick="seekReplay(-30)">- SKIP</button>
            <button onclick="seekReplay(30)">+ SKIP</button>
            <button id="replayPauseBtn" onclick="toggleReplayPause()">PAUSE</button>
            <button onclick="leaveReplay()">LEAVE</button>
        </div>
    </div>
    <div id="surgeFrame"></div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBB7Dbf_Y9ShE5InKfTIfHimXx-8UxlEg8",
        authDomain: "glow-runner-bc6b9.firebaseapp.com",
        projectId: "glow-runner-bc6b9",
        databaseURL: "https://glow-runner-bc6b9-default-rtdb.europe-west1.firebasedatabase.app/",
        appId: "1:962164006871:web:33a8ff5a2d4bf048287592"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Global State ---
    window.totalPoints = 0;
    window.highscore = 0;
    window.questLevel = 1;
    window.boughtSkins = ['cyan'];
    window.activeSkin = 'cyan';
    window.boughtShapes = ['circle'];
    window.activeShape = 'circle';
    window.boughtMaps = ['none'];
    window.activeMap = 'none';
    window.username = "";

    let runnerID = localStorage.getItem('glow_runner_id');
    if (!runnerID) {
        runnerID = 'RNR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('glow_runner_id', runnerID);
    }

    // --- ONLINE SYSTEM LOGIK ---
    const myOnlineRef = ref(db, 'online_users/' + runnerID);
    const connectedRef = ref(db, '.info/connected');

    onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
            onDisconnect(myOnlineRef).remove();
            set(myOnlineRef, true);
        }
    });

    onValue(ref(db, 'online_users'), (snap) => {
        const onlineValElem = document.getElementById('onlineVal');
        if (onlineValElem) {
            onlineValElem.innerText = snap.exists() ? Object.keys(snap.val()).length : 0;
        }
    });

    const wartungRef = ref(db, 'wartung');
    onValue(wartungRef, (snapshot) => {
        if (snapshot.exists() && snapshot.val() === true) {
            window.location.href = "wartung.html";
        }
    });

    async function loadUserData() {
        window.username = localStorage.getItem('glow_username');
        if(!window.username) {
            window.username = prompt("Runner Name?");
            if(!window.username) window.username = "Runner_" + runnerID.substr(4, 4);
            localStorage.setItem('glow_username', window.username);
        }

        const userRef = ref(db, 'users/' + runnerID);
        const lockedRef = ref(db, 'locked/' + runnerID);

        // Check Locked-Status separat (außerhalb des User-Knotens)
        onValue(lockedRef, (snapshot) => {
            if (snapshot.exists() && snapshot.val() === true) {
                document.body.innerHTML = `
                    <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:red; font-family:'Orbitron'; text-align:center; padding:20px;">
                        <h1 style="text-shadow: 0 0 20px red;">ACCESS DENIED</h1>
                        <p style="color:white;">Your account has been locked by the administrator.</p>
                        <div style="margin-top:20px; font-size:0.7rem; color:#444;">ID: ${runnerID}</div>
                    </div>`;
            }
        });
        
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                if (data.message) window.showRunnerMessage(data.message);

                window.totalPoints = data.points || 0;
                window.highscore = data.highscore || 0;
                window.questLevel = data.questLevel || 1;
                window.boughtSkins = data.boughtSkins || ['cyan'];
                window.activeSkin = data.activeSkin || 'cyan';
                window.boughtShapes = data.boughtShapes || ['circle'];
                window.activeShape = data.activeShape || 'circle';
                window.boughtMaps = data.boughtMaps || ['none'];
                window.activeMap = data.activeMap || 'none';

                if(data.username && data.username !== window.username) {
                    window.username = data.username;
                    localStorage.setItem('glow_username', window.username);
                }
                if (typeof updateUI === "function") updateUI();
            } else {
                window.saveToDB();
            }
            const welcomeText = document.getElementById('welcomeText');
            if(welcomeText) welcomeText.innerText = window.username;
        });
    }

    window.showRunnerMessage = function(msgText) {
        if (document.getElementById('runnerPopup')) return;
        const popup = document.createElement('div');
        popup.id = 'runnerPopup';
        popup.style = `position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #0ff; color: #fff; padding: 25px; z-index: 1000; text-align: center; border-radius: 10px; box-shadow: 0 0 30px #0ff; font-family: 'Orbitron', sans-serif; min-width: 280px;`;
        popup.innerHTML = `<h3 style="margin-top:0; color:#0ff; letter-spacing:2px;">INCOMING TRANSMISSION</h3><p style="margin: 20px 0; line-height:1.5;">${msgText}</p><button id="closeMsgBtn" class="btn" style="width:100%; border-color:#0f0; color:#0f0; background:transparent; padding:10px; cursor:pointer; font-family:'Orbitron';">GELESEN</button>`;
        document.body.appendChild(popup);
        document.getElementById('closeMsgBtn').onclick = () => {
            update(ref(db, 'users/' + runnerID), { message: null }).then(() => popup.remove());
        };
    };

    window.saveToDB = function() {
        if(!runnerID) return;
        update(ref(db, 'users/' + runnerID), {
            username: window.username,
            points: window.totalPoints,
            highscore: window.highscore,
            questLevel: window.questLevel,
            boughtSkins: window.boughtSkins,
            activeSkin: window.activeSkin,
            boughtShapes: window.boughtShapes,
            activeShape: window.activeShape,
            boughtMaps: window.boughtMaps,
            activeMap: window.activeMap,
            rnrId: runnerID
        }).catch(err => console.error("Update failed (Check locked status):", err));
    };

    loadUserData();
</script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let currentSelection = { type: 'color', id: 'cyan', price: 0 };
        let player = { x: 0, y: 0, r: 15 };
        let vortex = { x: 0, y: 0, tx: 0, ty: 0, speed: 1.2 };
        let target = { x: 0, y: 0 };
        let enemies = [], obstacles = [], particles = [], score = 0, gameActive = false, frame = 0;
        let reverseCharge = 0, isReverseActive = false, reverseTimer = 0;
        let dailyRiftActive = false, dailyRiftTimer = 0;
        let comboCount = 0, comboTimer = 0, surgeTimer = 0;
        let popups = [];
        let replayFrames = [], replayActive = false, replayPaused = false, lastRunStats = null;
        let replayIndex = 0, replayTick = 0;

        function updateUI() {
            if(document.getElementById('totalPointsHud')) document.getElementById('totalPointsHud').innerText = window.totalPoints;
            if(document.getElementById('menuTotal')) document.getElementById('menuTotal').innerText = window.totalPoints;
            if(document.getElementById('menuHighscore')) document.getElementById('menuHighscore').innerText = window.highscore;
            if(document.getElementById('shopPoints')) document.getElementById('shopPoints').innerText = window.totalPoints;
            
            document.querySelectorAll('.item-btn').forEach(btn => {
                const [type, id] = btn.id.split('-');
                let list = type === 'color' ? window.boughtSkins : (type === 'shape' ? window.boughtShapes : window.boughtMaps);
                let activeId = type === 'color' ? window.activeSkin : (type === 'shape' ? window.activeShape : window.activeMap);
                
                btn.classList.remove('owned', 'active');
                if(list.includes(id)) btn.classList.add('owned');
                if(activeId === id) btn.classList.add('active');
            });

            if(gameActive) {
                document.getElementById('currentScore').innerText = score;
                const eventHud = document.getElementById('eventHud');
                if(eventHud) eventHud.classList.toggle('hidden', !dailyRiftActive);
                if(dailyRiftActive && document.getElementById('riftTimer')) {
                    document.getElementById('riftTimer').innerText = Math.max(0, Math.ceil(dailyRiftTimer / 60));
                }
                const comboHud = document.getElementById('comboHud');
                if(comboHud) {
                    comboHud.classList.toggle('hidden', comboCount < 2 && surgeTimer <= 0);
                    comboHud.classList.toggle('surge', surgeTimer > 0);
                    document.getElementById('comboMult').innerText = getComboMultiplier();
                    document.getElementById('comboTime').innerText = surgeTimer > 0 ? "SURGE" : Math.ceil(comboTimer / 60);
                }
                const rBtn = document.getElementById('reverseBtn');
                if(isReverseActive) {
                    rBtn.innerText = Math.ceil(reverseTimer/60) + "s";
                    rBtn.className = "active";
                } else {
                    rBtn.innerText = Math.floor(reverseCharge) + "%";
                    rBtn.className = reverseCharge >= 100 ? "ready" : "";
                }
            }
        }

        function setPreview(type, id, price) {
            currentSelection = { type, id, price };
            const ship = document.getElementById('shipPreview');
            const meta = document.getElementById('previewMeta');
            const btn = document.getElementById('actionBtn');
            
            let color = type === 'color' ? (id === 'rainbow' ? 'white' : id) : (window.activeSkin === 'rainbow' ? 'white' : window.activeSkin);
            let shape = type === 'shape' ? id : window.activeShape;

            ship.style = ""; ship.innerHTML = "";
            ship.style.width = "30px"; ship.style.height = "30px";
            ship.style.background = color;
            ship.style.boxShadow = `0 0 15px ${color}`;

            if(id === 'rainbow' || (type !== 'color' && window.activeSkin === 'rainbow')) {
                ship.style.background = "linear-gradient(45deg, red, yellow, blue, red)";
                ship.style.backgroundSize = "200%";
            }

            if(shape === 'circle') ship.style.borderRadius = "50%";
            if(shape === 'square') ship.style.borderRadius = "0%";
            if(shape === 'triangle') {
                ship.style.background = "none"; ship.style.boxShadow = "none"; ship.style.width = "0"; ship.style.height = "0";
                ship.style.borderLeft = "15px solid transparent"; ship.style.borderRight = "15px solid transparent";
                ship.style.borderBottom = `30px solid ${color}`;
            }
            if(shape === 'diamond') { ship.style.transform = "rotate(45deg)"; }
            if(shape === 'star') { ship.style.clipPath = "polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)"; }
            if(shape === 'phoenix') { ship.style.clipPath = "polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 40%)"; }
            
            let list = type === 'color' ? window.boughtSkins : (type === 'shape' ? window.boughtShapes : window.boughtMaps);
            let isOwned = list.includes(id);
            let isActive = (type === 'color' && window.activeSkin === id) || (type === 'shape' && window.activeShape === id) || (type === 'map' && window.activeMap === id);

            meta.innerHTML = `<b style="color:#0ff">${id.toUpperCase()}</b><br>Price: ${price} Crystals`;
            btn.innerText = isActive ? "EQUIPPED" : (isOwned ? "EQUIP" : (window.totalPoints >= price ? "BUY NOW" : "TOO EXPENSIVE"));
        }

        function handleAction() {
            const { type, id, price } = currentSelection;
            let list = type === 'color' ? window.boughtSkins : (type === 'shape' ? window.boughtShapes : window.boughtMaps);
            if(list.includes(id)) {
                if(type === 'color') window.activeSkin = id; else if(type === 'shape') window.activeShape = id; else window.activeMap = id;
            } else if (window.totalPoints >= price) {
                window.totalPoints -= price; list.push(id);
                if(type === 'color') window.activeSkin = id; else if(type === 'shape') window.activeShape = id; else window.activeMap = id;
            }
            window.saveToDB(); updateUI(); setPreview(type, id, price);
        }

        function openShop() { document.getElementById('menu').classList.add('hidden'); document.getElementById('shop').classList.remove('hidden'); setPreview('color', window.activeSkin, 0); updateUI(); }
        function closeShop() { document.getElementById('shop').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); }

        function startDailyRift() {
            startGame('dailyRift');
        }

        function startGame(mode = 'normal') {
            replayActive = false;
            gameActive = true;
            dailyRiftActive = mode === 'dailyRift';
            dailyRiftTimer = dailyRiftActive ? 3600 : 0;
            document.getElementById('runResult').classList.add('hidden');
            document.getElementById('replayBadge').classList.add('hidden');
            document.getElementById('replayTimeline').classList.add('hidden');
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('reverseContainer').classList.remove('hidden');
            score = 0; enemies = []; obstacles = []; reverseCharge = 0; isReverseActive = false; frame = 0;
            comboCount = 0; comboTimer = 0; surgeTimer = 0; popups = [];
            replayFrames = [];
            vortex.x = (player.x > w/2) ? 50 : w - 50;
            vortex.y = (player.y > h/2) ? 50 : h - 50;
            vortex.tx = Math.random() * w; vortex.ty = Math.random() * h;
            spawnEnemy(); moveTarget(); animate();
        }

        function activateReverse() { if(reverseCharge >= 100 && !isReverseActive) { isReverseActive = true; reverseTimer = 300; reverseCharge = 0; } }

        function spawnEnemy() {
            if (!gameActive) return;
            enemies.push({ x: Math.random()*w, y: -50, r: 12, speed: 2 + (score/15) + (dailyRiftActive ? 0.7 : 0) });
            setTimeout(spawnEnemy, Math.max(dailyRiftActive ? 420 : 600, 2500 - (score*100)));
        }

        function moveTarget() { target.x = 100 + Math.random()*(w-200); target.y = 100 + Math.random()*(h-200); }

        function getComboMultiplier() {
            if(surgeTimer > 0) return dailyRiftActive ? 5 : 4;
            if(comboCount >= 12) return dailyRiftActive ? 4 : 3;
            if(comboCount >= 7) return dailyRiftActive ? 3 : 2;
            if(comboCount >= 3) return 2;
            return dailyRiftActive ? 2 : 1;
        }

        function addPopup(text, x, y, color = "#ff0") {
            popups.push({ text, x, y, vy: -1.4, life: 70, maxLife: 70, color });
        }

        function collectField() {
            comboCount++;
            comboTimer = dailyRiftActive ? 240 : 180;

            if(comboCount === 8 || comboCount === 16) {
                surgeTimer = 360;
                addPopup("SURGE!", player.x, player.y - 35, "#ff0");
            }

            const mult = getComboMultiplier();
            const baseScore = dailyRiftActive ? 2 : 1;
            const baseCrystals = dailyRiftActive ? 20 : 10;
            score += baseScore * mult;
            window.totalPoints += baseCrystals * mult;
            if(!isReverseActive) reverseCharge = Math.min(100, reverseCharge + (dailyRiftActive ? 12 : 8) + mult);
            addPopup(`x${mult}`, target.x, target.y - 20, surgeTimer > 0 ? "#ff0" : "#0ff");
            moveTarget();
        }

        function animate() {
            if (!gameActive) return;
            frame++;
            ctx.fillStyle = "rgba(0, 0, 0, 0.25)"; 
            ctx.fillRect(0,0,w,h);

            if(dailyRiftActive) {
                dailyRiftTimer--;
                if(dailyRiftTimer <= 0) return endGame("DAILY RIFT COMPLETE");
            }
            if(comboTimer > 0) comboTimer--;
            else comboCount = 0;
            if(surgeTimer > 0) surgeTimer--;

            if(window.activeMap === 'grid') {
                ctx.strokeStyle="rgba(0,255,255,0.15)"; ctx.lineWidth=1;
                for(let i=0; i<w; i+=60) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
                for(let i=0; i<h; i+=60) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }
            } else if(window.activeMap === 'stars') {
                ctx.fillStyle="white";
                for(let i=0; i<50; i++) { ctx.fillRect((Math.sin(i)*10000)%w, (i*frame*0.5)%h, 2, 2); }
            } else if(window.activeMap === 'matrix') {
                ctx.fillStyle="#0f0"; ctx.font="10px monospace";
                for(let i=0; i<w; i+=25) { ctx.fillText(Math.random()>0.8?"1":"0", i, (frame*3 + i*2)%h); }
            }

            if(dailyRiftActive) {
                ctx.save();
                ctx.strokeStyle = `hsla(${frame % 360}, 100%, 60%, ${surgeTimer > 0 ? 0.42 : 0.22})`;
                ctx.lineWidth = surgeTimer > 0 ? 4 : 2;
                ctx.translate(w / 2, h / 2);
                ctx.rotate(frame * 0.015);
                for(let i = 0; i < 8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(80, 0);
                    ctx.lineTo(Math.max(w, h), 0);
                    ctx.stroke();
                }
                ctx.restore();
            }

            let dxV = vortex.tx - vortex.x; let dyV = vortex.ty - vortex.y;
            let distV = Math.hypot(dxV, dyV);
            if(distV < 20) { vortex.tx = Math.random()*w; vortex.ty = Math.random()*h; }
            vortex.x += dxV/distV * vortex.speed; vortex.y += dyV/distV * vortex.speed;
            let pulse = Math.sin(frame*0.1) * 8;
            let g = ctx.createRadialGradient(vortex.x, vortex.y, 5, vortex.x, vortex.y, 60+pulse);
            g.addColorStop(0, "#fff"); g.addColorStop(0.2, "#f0f"); g.addColorStop(1, "transparent");
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(vortex.x, vortex.y, 90+pulse, 0, Math.PI*2); ctx.fill();

            if(Math.hypot(vortex.x-player.x, vortex.y-player.y) < 55) return endGame("VORTEX CONSUMED YOU");

            enemies.forEach((en, i) => {
                let d = Math.hypot(player.x-en.x, player.y-en.y);
                if (isReverseActive) {
                    en.x -= (player.x-en.x)/d * (en.speed * 1.2); en.y -= (player.y-en.y)/d * (en.speed * 1.2);
                    ctx.fillStyle = "#0f0";
                } else {
                    en.x += (player.x-en.x)/d * en.speed; en.y += (player.y-en.y)/d * en.speed;
                    ctx.fillStyle = "#f00";
                }
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();
                if(d < 25 && !isReverseActive) return endGame("DESTRUCTION");
                if(d < 25 && isReverseActive) { enemies.splice(i, 1); score += 2; window.totalPoints += 5; }
            });

            if(Math.hypot(player.x-target.x, player.y-target.y) < 30) { 
                collectField();
            }
            ctx.fillStyle = surgeTimer > 0 ? "#ff0" : (dailyRiftActive ? "#0ff" : "#ff0");
            ctx.shadowBlur = dailyRiftActive || surgeTimer > 0 ? 24 : 0;
            ctx.shadowColor = surgeTimer > 0 ? "#ff0" : (dailyRiftActive ? "#0ff" : "transparent");
            ctx.beginPath(); ctx.arc(target.x, target.y, surgeTimer > 0 ? 15 : (dailyRiftActive ? 12 : 10), 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            popups.forEach((p, i) => {
                p.y += p.vy;
                p.life--;
                ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
                ctx.fillStyle = p.color;
                ctx.font = "bold 18px Orbitron";
                ctx.textAlign = "center";
                ctx.fillText(p.text, p.x, p.y);
                if(p.life <= 0) popups.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            ctx.save(); ctx.translate(player.x, player.y);
            let pColor = window.activeSkin === 'rainbow' ? `hsl(${frame%360},100%,50%)` : window.activeSkin;
            ctx.fillStyle = pColor; ctx.shadowBlur = 20; ctx.shadowColor = pColor;
            
            if(window.activeShape === 'circle') { ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill(); }
            else if(window.activeShape === 'square') { ctx.fillRect(-15,-15,30,30); }
            else if(window.activeShape === 'triangle') { ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(18,12); ctx.lineTo(-18,12); ctx.fill(); }
            else if(window.activeShape === 'star') { ctx.beginPath(); for(let i=0;i<10;i++){ let r=i%2?18:8; let a=Math.PI*2/10*i; ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); } ctx.fill(); }
            else if(window.activeShape === 'diamond') { ctx.rotate(Math.PI/4); ctx.fillRect(-15,-15,30,30); }
            else if(window.activeShape === 'phoenix') { ctx.beginPath(); ctx.moveTo(0,-25); ctx.quadraticCurveTo(20,0,0,25); ctx.quadraticCurveTo(-20,0,0,-25); ctx.fill(); }
            ctx.restore();

            if(frame % 3 === 0) captureReplayFrame();

            if(isReverseActive) { reverseTimer--; if(reverseTimer <= 0) isReverseActive = false; }
            updateUI();
            requestAnimationFrame(animate);
        }

        function captureReplayFrame() {
            replayFrames.push({
                player: { x: player.x, y: player.y },
                vortex: { x: vortex.x, y: vortex.y },
                target: { x: target.x, y: target.y },
                enemies: enemies.slice(0, 14).map(en => ({ x: en.x, y: en.y, r: en.r })),
                score,
                combo: comboCount,
                activeSkin: window.activeSkin,
                activeShape: window.activeShape,
                activeMap: window.activeMap,
                frame,
                surge: surgeTimer > 0,
                daily: dailyRiftActive
            });
            if(replayFrames.length > 520) replayFrames.shift();
        }

        function drawReplaySnapshot(snapshot, index) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
            ctx.fillRect(0, 0, w, h);

            if(snapshot.activeMap === 'grid') {
                ctx.strokeStyle="rgba(0,255,255,0.15)"; ctx.lineWidth=1;
                for(let i=0; i<w; i+=60) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
                for(let i=0; i<h; i+=60) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }
            } else if(snapshot.activeMap === 'stars') {
                ctx.fillStyle="white";
                for(let i=0; i<50; i++) { ctx.fillRect((Math.sin(i)*10000)%w, (i*snapshot.frame*0.5)%h, 2, 2); }
            } else if(snapshot.activeMap === 'matrix') {
                ctx.fillStyle="#0f0"; ctx.font="10px monospace";
                for(let i=0; i<w; i+=25) { ctx.fillText(Math.random()>0.8?"1":"0", i, (snapshot.frame*3 + i*2)%h); }
            }

            if(snapshot.daily) {
                ctx.save();
                ctx.strokeStyle = `hsla(${snapshot.frame % 360}, 100%, 60%, ${snapshot.surge ? 0.42 : 0.22})`;
                ctx.lineWidth = snapshot.surge ? 4 : 2;
                ctx.translate(w / 2, h / 2);
                ctx.rotate(snapshot.frame * 0.015);
                for(let i = 0; i < 8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(80, 0);
                    ctx.lineTo(Math.max(w, h), 0);
                    ctx.stroke();
                }
                ctx.restore();
            }

            let pulse = Math.sin(snapshot.frame * 0.1) * 8;
            let g = ctx.createRadialGradient(snapshot.vortex.x, snapshot.vortex.y, 5, snapshot.vortex.x, snapshot.vortex.y, 70 + pulse);
            g.addColorStop(0, "#fff"); g.addColorStop(0.2, "#f0f"); g.addColorStop(1, "transparent");
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(snapshot.vortex.x, snapshot.vortex.y, 90 + pulse, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = snapshot.surge ? "#ff0" : (snapshot.daily ? "#0ff" : "#ff0");
            ctx.shadowBlur = 24;
            ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(snapshot.target.x, snapshot.target.y, snapshot.surge ? 15 : 10, 0, Math.PI * 2); ctx.fill();

            ctx.shadowBlur = 16;
            ctx.shadowColor = "#f00";
            ctx.fillStyle = "#f00";
            snapshot.enemies.forEach(en => {
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2); ctx.fill();
            });

            ctx.save(); ctx.translate(snapshot.player.x, snapshot.player.y);
            let pColor = snapshot.activeSkin === 'rainbow' ? `hsl(${snapshot.frame%360},100%,50%)` : snapshot.activeSkin;
            ctx.fillStyle = pColor; ctx.shadowBlur = 24; ctx.shadowColor = pColor;
            if(snapshot.activeShape === 'circle') { ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill(); }
            else if(snapshot.activeShape === 'square') { ctx.fillRect(-15,-15,30,30); }
            else if(snapshot.activeShape === 'triangle') { ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(18,12); ctx.lineTo(-18,12); ctx.fill(); }
            else if(snapshot.activeShape === 'star') { ctx.beginPath(); for(let i=0;i<10;i++){ let r=i%2?18:8; let a=Math.PI*2/10*i; ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); } ctx.fill(); }
            else if(snapshot.activeShape === 'diamond') { ctx.rotate(Math.PI/4); ctx.fillRect(-15,-15,30,30); }
            else if(snapshot.activeShape === 'phoenix') { ctx.beginPath(); ctx.moveTo(0,-25); ctx.quadraticCurveTo(20,0,0,25); ctx.quadraticCurveTo(-20,0,0,-25); ctx.fill(); }
            ctx.restore();

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            document.getElementById('currentScore').innerText = snapshot.score;
            const comboHud = document.getElementById('comboHud');
            if(comboHud) {
                comboHud.classList.toggle('hidden', snapshot.combo < 2 && !snapshot.surge);
                comboHud.classList.toggle('surge', snapshot.surge);
                document.getElementById('comboMult').innerText = snapshot.combo;
                document.getElementById('comboTime').innerText = snapshot.surge ? "SURGE" : "REPLAY";
            }
        }

        function formatReplayTime(frames) {
            const seconds = Math.max(0, Math.round(frames / 20));
            return `00:${String(seconds).padStart(2, "0")}`;
        }

        function updateReplayTimeline(index) {
            const progress = replayFrames.length <= 1 ? 0 : (index / (replayFrames.length - 1)) * 100;
            document.getElementById('replayProgress').style.width = `${Math.min(100, progress)}%`;
            document.getElementById('replayTime').innerText = formatReplayTime(index);
            document.getElementById('replayTotal').innerText = formatReplayTime(replayFrames.length);
        }

        function drawCurrentReplayFrame() {
            if(!replayFrames.length) return;
            replayIndex = Math.max(0, Math.min(replayFrames.length - 1, replayIndex));
            drawReplaySnapshot(replayFrames[replayIndex], replayIndex);
            updateReplayTimeline(replayIndex);
        }

        function toggleReplayPause() {
            if(!replayActive) return;
            replayPaused = !replayPaused;
            document.getElementById('replayPauseBtn').innerText = replayPaused ? "PLAY" : "PAUSE";
            if(!replayPaused) replayLoop();
        }

        function seekReplay(amount) {
            if(!replayActive) return;
            replayIndex = Math.max(0, Math.min(replayFrames.length - 1, replayIndex + amount));
            drawCurrentReplayFrame();
        }

        function leaveReplay() {
            replayActive = false;
            replayPaused = false;
            document.getElementById('replayPauseBtn').innerText = "PAUSE";
            document.getElementById('replayBadge').classList.add('hidden');
            document.getElementById('replayTimeline').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
            if(document.getElementById('comboHud')) document.getElementById('comboHud').classList.add('hidden');
            document.getElementById('runResult').classList.remove('hidden');
        }

        function replayLoop() {
            if(!replayActive || replayPaused) return;
            drawCurrentReplayFrame();
            replayTick++;
            if(replayTick % 5 === 0 && replayIndex < replayFrames.length - 1) {
                replayIndex++;
            }
            if(replayIndex >= replayFrames.length - 1) {
                replayIndex = replayFrames.length - 1;
                drawCurrentReplayFrame();
                replayPaused = true;
                document.getElementById('replayPauseBtn').innerText = "PLAY";
                return;
            }
            requestAnimationFrame(replayLoop);
        }

        function startReplay() {
            if(!replayFrames.length) return;
            replayActive = true;
            replayPaused = false;
            gameActive = false;
            document.getElementById('runResult').classList.add('hidden');
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('reverseContainer').classList.add('hidden');
            document.getElementById('replayBadge').classList.remove('hidden');
            document.getElementById('replayTimeline').classList.remove('hidden');
            document.getElementById('replayProgress').style.width = "0%";
            replayIndex = 0;
            replayTick = 0;
            document.getElementById('replayPauseBtn').innerText = "PAUSE";

            replayLoop();
        }

        function closeRunResult() {
            replayActive = false;
            replayPaused = false;
            document.getElementById('replayBadge').classList.add('hidden');
            document.getElementById('replayTimeline').classList.add('hidden');
            document.getElementById('hud').classList.add('hidden');
            if(document.getElementById('comboHud')) document.getElementById('comboHud').classList.add('hidden');
            document.getElementById('runResult').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
            ctx.fillRect(0, 0, w, h);
        }

        document.getElementById('replayTrack').addEventListener('click', (event) => {
            if(!replayActive || !replayFrames.length) return;
            const rect = event.currentTarget.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            replayIndex = Math.round(ratio * (replayFrames.length - 1));
            drawCurrentReplayFrame();
        });

        function endGame(m) { 
            gameActive = false;
            if (score > window.highscore) {
                window.highscore = score;
            }
            window.saveToDB(); 
            lastRunStats = {
                message: m,
                score,
                best: window.highscore,
                combo: comboCount,
                mode: dailyRiftActive ? "DAILY RIFT" : "NORMAL"
            };
            document.getElementById('resultMessage').innerText = m;
            document.getElementById('resultScore').innerText = score;
            document.getElementById('resultBest').innerText = window.highscore;
            document.getElementById('resultCombo').innerText = "x" + Math.max(1, getComboMultiplier());
            document.getElementById('resultMode').innerText = lastRunStats.mode;
            
            updateUI(); 
            document.getElementById('menu').classList.remove('hidden'); 
            document.getElementById('runResult').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('reverseContainer').classList.add('hidden');
            dailyRiftActive = false;
            dailyRiftTimer = 0;
            comboCount = 0;
            comboTimer = 0;
            surgeTimer = 0;
            popups = [];
            if(document.getElementById('eventHud')) document.getElementById('eventHud').classList.add('hidden');
            if(document.getElementById('comboHud')) document.getElementById('comboHud').classList.add('hidden');
        }

        const move = e => { let t = e.touches ? e.touches[0] : e; player.x = t.clientX; player.y = t.clientY; };
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
    </script>
</body>
</html>
