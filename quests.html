<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glow Runner - Missions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000; color: white; font-family: 'Orbitron'; text-align: center; padding: 20px; margin: 0; }
        .quest-list { max-width: 500px; margin: 20px auto; text-align: left; }
        .quest-item { 
            background: #111; border: 1px solid #333; padding: 20px; 
            margin-bottom: 15px; border-radius: 10px; position: relative;
            border-left: 5px solid #0ff; transition: 0.3s;
        }
        .quest-item.can-claim { border-left-color: #0f0; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .quest-title { font-size: 1.1rem; color: #0ff; display: block; margin-bottom: 5px; }
        .reward { color: #ff0; font-size: 0.9rem; font-weight: bold; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0ff; width: 0%; transition: 0.5s; }
        .btn-claim { 
            position: absolute; right: 20px; top: 30px; 
            background: #0f0; color: #000; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; display: none; font-family: 'Orbitron';
            font-weight: bold;
        }
        .back { display: inline-block; margin-top: 30px; color: #0ff; text-decoration: none; border: 1px solid #0ff; padding: 10px 20px; border-radius: 5px; }
        
        /* Online Anzeige Style */
        #onlineCount { color: #0f0; font-size: 0.7rem; margin-top: 10px; margin-bottom: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <h1>DYNAMIC MISSIONS</h1>
    <p id="levelDisplay">Pilot Level: 1</p>
    
    <div id="onlineCount">
        ● <span id="onlineVal">0</span> RUNNER LIVE
    </div>

    <div class="quest-list" id="questList">
        Lade Herausforderungen...
    </div>

    <a href="index.html" class="back">ZURÜCK ZUM MENÜ</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB7Dbf_Y9ShE5InKfTIfHimXx-8UxlEg8",
            authDomain: "glow-runner-bc6b9.firebaseapp.com",
            projectId: "glow-runner-bc6b9",
            databaseURL: "https://glow-runner-bc6b9-default-rtdb.europe-west1.firebasedatabase.app/",
            appId: "1:962164006871:web:33a8ff5a2d4bf048287592"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // WICHTIG: Nutze die runnerID wie in der index.html
        const runnerID = localStorage.getItem('glow_runner_id');

        // --- ONLINE PRÄSENZ LOGIK ---
        if (runnerID) {
            const connectedRef = ref(db, '.info/connected');
            const myOnlineRef = ref(db, 'online_users/' + runnerID);

            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    onDisconnect(myOnlineRef).remove();
                    set(myOnlineRef, true);
                }
            });

            // Online-Zähler Anzeige aktualisieren
            const onlineValElem = document.getElementById('onlineVal');
            onValue(ref(db, 'online_users'), (snapshot) => {
                const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                if(onlineValElem) onlineValElem.innerText = count;
            });
        }

        // --- WARTUNGS-CHECK ---
        const wartungRef = ref(db, 'wartung');
        onValue(wartungRef, (snapshot) => {
            if (snapshot.exists() && snapshot.val() === true) {
                window.location.href = "wartung.html";
            }
        });

        if (!runnerID) {
            document.getElementById('questList').innerText = "Fehler: Keine Runner-ID gefunden. Bitte starte das Spiel neu.";
        } else {
            onValue(ref(db, 'users/' + runnerID), (snap) => {
                const data = snap.val();
                if(!data) {
                    document.getElementById('questList').innerText = "Keine Daten gefunden. Spiele erst eine Runde!";
                    return;
                }

                if(!data.questLevel) data.questLevel = 1;
                document.getElementById('levelDisplay').innerText = `Pilot Level: ${data.questLevel}`;

                const questList = document.getElementById('questList');
                questList.innerHTML = "";

                // Quests generieren
                const generatedQuests = [
                    {
                        id: 'score_easy_' + data.questLevel,
                        title: "Score Jäger",
                        desc: `Erreiche einen Score von ${data.questLevel * 50}`,
                        target: data.questLevel * 50,
                        current: data.highscore || 0,
                        reward: data.questLevel * 100
                    },
                    {
                        id: 'score_hard_' + data.questLevel,
                        title: "Highscore Master",
                        desc: `Erreiche einen Highscore von ${data.questLevel * 120}`,
                        target: data.questLevel * 120,
                        current: data.highscore || 0,
                        reward: data.questLevel * 250
                    }
                ];

                generatedQuests.forEach(q => {
                    const isCompleted = data.completedQuests && data.completedQuests[q.id];
                    const progress = Math.min(100, (q.current / q.target) * 100);
                    const canClaim = !isCompleted && q.current >= q.target;

                    const card = document.createElement('div');
                    card.className = `quest-item ${canClaim ? 'can-claim' : ''}`;
                    card.innerHTML = `
                        <span class="quest-title">${q.title}</span>
                        <p style="font-size:0.8rem; margin:5px 0;">${q.desc}</p>
                        <span class="reward">+${q.reward} 💎</span>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                        <button class="btn-claim" id="btn-${q.id}" style="display: ${canClaim ? 'block' : 'none'}">BELOHNUNG</button>
                        ${isCompleted ? '<span style="color:#0f0; position:absolute; right:20px; top:30px;">✓ FERTIG</span>' : ''}
                    `;
                    
                    questList.appendChild(card);

                    if(canClaim) {
                        document.getElementById(`btn-${q.id}`).onclick = () => claimReward(q, data);
                    }
                });
            });
        }

        function claimReward(quest, data) {
            if(!data.completedQuests) data.completedQuests = {};
            
            data.completedQuests[quest.id] = true;
            data.points = (Number(data.points) || 0) + quest.reward;
            data.questLevel = (Number(data.questLevel) || 1) + 1;

            // Update statt Set nutzen, um sicherzugehen, dass andere Daten erhalten bleiben
            update(ref(db, 'users/' + runnerID), data).then(() => {
                alert(`Mission erfüllt! +${quest.reward} Kristalle erhalten.`);
            });
        }
    </script>
</body>
</html>
