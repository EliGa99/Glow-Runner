<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Runner - Bestenliste</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000; color: white; font-family: 'Orbitron'; text-align: center; padding: 20px; }
        .leaderboard-box { max-width: 400px; margin: 0 auto; border: 2px solid #f0f; border-radius: 15px; padding: 20px; background: rgba(255,0,255,0.05); }
        .entry { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        .rank { color: #f0f; font-weight: bold; }
        .score { color: #0ff; }
        .back { display: inline-block; margin-top: 30px; color: #888; text-decoration: none; border: 1px solid #888; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>GLOBAL RANKING</h1>
    <div class="leaderboard-box" id="leaderboard">
        Lade Daten aus der Cloud...
    </div>
    <a href="index.html" class="back">ZURÜCK ZUM MENÜ</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        // DEINE FIREBASE CONFIG (Muss in jeder Seite gleich sein)
        const firebaseConfig = {
            apiKey: "AIzaSyBB7Dbf_Y9ShE5InKfTIfHimXx-8UxlEg8",
            authDomain: "glow-runner-bc6b9.firebaseapp.com",
            projectId: "glow-runner-bc6b9",
            databaseURL: "https://glow-runner-bc6b9-default-rtdb.europe-west1.firebasedatabase.app/",
            appId: "1:962164006871:web:33a8ff5a2d4bf048287592"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Bestenliste laden
        const topRef = query(ref(db, 'users'), orderByChild('highscore'), limitToLast(10));
        onValue(topRef, (snap) => {
            const data = snap.val();
            const listDiv = document.getElementById('leaderboard');
            listDiv.innerHTML = "";
            
            if(data) {
                // Firebase gibt Daten unsortiert, wir sortieren sie absteigend
                const sorted = Object.entries(data).sort((a,b) => b[1].highscore - a[1].highscore);
                sorted.forEach(([name, val], i) => {
                    listDiv.innerHTML += `
                        <div class="entry">
                            <span><span class="rank">#${i+1}</span> ${name}</span>
                            <span class="score">${val.highscore}</span>
                        </div>`;
                });
            } else {
                listDiv.innerHTML = "Noch keine Einträge.";
            }
        });
    </script>
</body>
</html>
