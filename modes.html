<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Runner - Modi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000; color: white; font-family: 'Orbitron'; text-align: center; padding: 20px; }
        .mode-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        .mode-card { 
            width: 80%; max-width: 400px; padding: 20px; border: 2px solid #333; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; background: rgba(20,20,20,0.8);
        }
        .mode-card:hover { border-color: #0ff; transform: scale(1.02); }
        .mode-card.active { border-color: #0ff; box-shadow: 0 0 20px #0ff; background: rgba(0,255,255,0.1); }
        h3 { margin: 0 0 10px 0; color: #0ff; }
        p { font-size: 0.8rem; color: #ccc; margin: 0; }
        .back { display: inline-block; margin-top: 40px; color: #888; text-decoration: none; border-bottom: 1px solid #888; }
    </style>
</head>
<body>
    <h1>SPIELMODI</h1>
    
    <div class="mode-container">
        <div class="mode-card" id="classic" onclick="selectMode('classic')">
            <h3>CLASSIC</h3>
            <p>Flüssiges Gleiten. Der Glow folgt deinem Finger mit einer leichten Verzögerung.</p>
        </div>

        <div class="mode-card" id="blink" onclick="selectMode('blink')">
            <h3>BLINK (TELEPORT)</h3>
            <p>Echtzeit-Sprung. Nimm den Finger weg und setze ihn woanders auf, um dich sofort zu teleportieren.</p>
        </div>

    </div>

    <a href="index.html" class="back">ZURÜCK ZUM MENÜ</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB7Dbf_Y9ShE5InKfTIfHimXx-8UxlEg8",
            authDomain: "glow-runner-bc6b9.firebaseapp.com",
            projectId: "glow-runner-bc6b9",
            databaseURL: "https://glow-runner-bc6b9-default-rtdb.europe-west1.firebasedatabase.app/",
            appId: "1:962164006871:web:33a8ff5a2d4bf048287592"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const username = localStorage.getItem('glow_user_v4') || "Pilot";

        window.selectMode = (m) => {
            // Speichern für das Spiel
            localStorage.setItem('glow_mode', m);
            
            // Speichern in Firebase
            set(ref(db, 'users/' + username + '/currentMode'), m);

            // UI Update
            document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
            document.getElementById(m).classList.add('active');
        };

        // Aktuellen Modus beim Laden anzeigen
        const savedMode = localStorage.getItem('glow_mode') || 'classic';
        document.getElementById(savedMode).classList.add('active');
    </script>
</body>
</html>
