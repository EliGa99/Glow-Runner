<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Runner - Advanced Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #050505; color: white; font-family: 'Orbitron'; text-align: center; padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        
        #login-area { margin-top: 100px; }
        input { background: #111; border: 1px solid #0ff; color: white; padding: 8px; font-family: 'Orbitron'; border-radius: 5px; }
        
        button { background: #0ff; color: black; border: none; padding: 8px 15px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 5px; margin: 3px; font-size: 0.8rem; }
        button:hover { box-shadow: 0 0 15px #0ff; }
        
        .maintenance-box { border: 2px solid #ff0; padding: 20px; margin-bottom: 30px; border-radius: 10px; background: rgba(255,255,0,0.05); }
        .m-active { color: #ff0; text-shadow: 0 0 10px #ff0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; font-size: 0.85rem; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #222; color: #0ff; }
        
        .status-locked { color: #ff4444; }
        .status-active { color: #44ff44; }
        .id-text { font-size: 0.7rem; color: #666; }
        
        .hidden { display: none; }
        .btn-msg { background: #f0f; color: white; }
        .btn-name { background: #555; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-area">
            <h1>ADMIN ACCESS</h1>
            <input type="password" id="adminPass" placeholder="PASSWORT">
            <button onclick="checkLogin()">LOGIN</button>
        </div>

        <div id="admin-content" class="hidden">
            <h1>CONTROL CENTER</h1>

            <div class="maintenance-box">
                <h3>WARTUNGSMODUS: <span id="mStatus" class="m-active">PRÜFE...</span></h3>
                <button onclick="setMaintenance(true)" style="background:#ff0">WARTUNG AN</button>
                <button onclick="setMaintenance(false)" style="background:#44ff44">WARTUNG AUS</button>
            </div>

            <div style="margin-bottom: 20px;">
                <button onclick="location.reload()">REFRESH</button>
                <button onclick="location.href='index.html'" style="background:#555; color:white;">SPIEL ÖFFNEN</button>
            </div>
            
            <table id="userTable">
                <thead>
                    <tr>
                        <th>ID / Username</th>
                        <th>Highscore</th>
                        <th>Status</th>
                        <th>Aktionen</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB7Dbf_Y9ShE5InKfTIfHimXx-8UxlEg8",
            authDomain: "glow-runner-bc6b9.firebaseapp.com",
            projectId: "glow-runner-bc6b9",
            databaseURL: "https://glow-runner-bc6b9-default-rtdb.europe-west1.firebasedatabase.app/",
            appId: "1:962164006871:web:33a8ff5a2d4bf048287592"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN
        window.checkLogin = function() {
            const input = document.getElementById('adminPass').value.trim();
            if (input === "290171") {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadAdminData();
            } else {
                alert("Falsches Passwort!");
            }
        };

        function loadAdminData() {
            // 1. Wartungsstatus laden
            onValue(ref(db, 'wartung'), (snapshot) => {
                const status = snapshot.val() === true;
                const el = document.getElementById('mStatus');
                el.innerText = status ? "AKTIV (Spiel gesperrt)" : "INAKTIV (Spiel offen)";
                el.style.color = status ? "#ff4444" : "#44ff44";
            });

            // 2. User laden
            onValue(ref(db, 'users'), (snapshot) => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                const data = snapshot.val();

                for (let id in data) {
                    const user = data[id];
                    const isLocked = user.locked === true;
                    const name = user.username || "Kein Name";

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <span class="id-text">${id}</span><br>
                            <strong>${name}</strong>
                        </td>
                        <td>${user.highscore || 0}</td>
                        <td class="${isLocked ? 'status-locked' : 'status-active'}">
                            ${isLocked ? 'LOCKED' : 'ACTIVE'}
                        </td>
                        <td>
                            <button class="btn-name" onclick="changeName('${id}', '${name}')">NAME</button>
                            <button class="btn-msg" onclick="sendMessage('${id}')">MSG</button>
                            <button style="background:${isLocked?'#44ff44':'#ff4444'}; color:${isLocked?'black':'white'}" 
                                onclick="setUserLock('${id}', ${!isLocked})">
                                ${isLocked ? 'UNLOCK' : 'LOCK'}
                            </button>
                        </td>
                    `;
                    list.appendChild(tr);
                }
            });
        }

        // --- FUNKTIONEN ---

        window.setMaintenance = function(val) {
            set(ref(db, 'wartung'), val);
        };

        window.setUserLock = function(id, shouldLock) {
            update(ref(db, 'users/' + id), { locked: shouldLock ? true : null });
        };

        window.changeName = function(id, oldName) {
            const newName = prompt("Neuer Name für " + oldName + "?", oldName);
            if (newName && newName !== oldName) {
                update(ref(db, 'users/' + id), { username: newName });
            }
        };

        window.sendMessage = function(id) {
            const msg = prompt("Nachricht an Runner senden:");
            if (msg !== null) {
                // Setzt das message-Feld in Firebase
                update(ref(db, 'users/' + id), { message: msg });
                alert("Nachricht gesendet!");
            }
        };

    </script>
</body>
</html>
